<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="1120" viewBox="0 0 1700 1120" role="img" aria-labelledby="title desc">
  <title id="title">C4 - Nível 1: Contexto do Sistema</title>
  <desc id="desc">Diagrama C4 de contexto do sistema com ator principal, sistema em escopo e sistemas externos.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbfdff"/>
      <stop offset="100%" stop-color="#eef3f9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#7c8798"/>
    </marker>
    <style>
      .title { font: 700 34px 'Aptos', 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 18px 'Aptos', 'Segoe UI', Arial, sans-serif; fill: #475569; }
      .label { font: 700 13px 'Aptos', 'Segoe UI', Arial, sans-serif; fill: #ffffff; }
      .label-light { font: 700 13px 'Aptos', 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .node-title { font: 700 24px 'Aptos', 'Segoe UI', Arial, sans-serif; fill: #ffffff; }
      .node-title-light { font: 700 24px 'Aptos', 'Segoe UI', Arial, sans-serif; fill: #ffffff; }
      .node-type { font: 400 17px 'Aptos', 'Segoe UI', Arial, sans-serif; fill: #dbeafe; }
      .node-type-light { font: 400 17px 'Aptos', 'Segoe UI', Arial, sans-serif; fill: #eef2f7; }
      .node-desc { font: 400 17px 'Aptos', 'Segoe UI', Arial, sans-serif; fill: #eff6ff; }
      .node-desc-light { font: 400 17px 'Aptos', 'Segoe UI', Arial, sans-serif; fill: #f8fafc; }
      .edge { font: 600 14px 'Aptos', 'Segoe UI', Arial, sans-serif; fill: #5b6678; }
      .legend-title { font: 700 18px 'Aptos', 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .legend-text { font: 400 14px 'Aptos', 'Segoe UI', Arial, sans-serif; fill: #475569; }
    </style>
  </defs>

  <rect width="1700" height="1120" fill="url(#bg)"/>
  <text x="850" y="92" text-anchor="middle" class="title">C4 - Nível 1: Contexto do Sistema</text>
  <text x="850" y="128" text-anchor="middle" class="subtitle">Fronteiras do sistema, ator principal e sistemas externos relevantes para o fluxo do case</text>

  <g filter="url(#shadow)">
    <rect x="530" y="240" width="640" height="470" rx="26" fill="#ffffff" stroke="#0f172a" stroke-width="1.5"/>
    <text x="560" y="276" class="legend-title">Cashflow Daily Control Platform</text>
    <text x="560" y="302" class="legend-text">[Software System]</text>
  </g>

  <g filter="url(#shadow)">
    <circle cx="300" cy="230" r="34" fill="#174a86"/>
    <path d="M260 310c0-27 20-46 40-46s40 19 40 46v10h-80z" fill="#174a86"/>
    <rect x="210" y="310" width="180" height="150" rx="20" fill="#174a86"/>
    <text x="300" y="362" text-anchor="middle" class="node-title">Comerciante</text>
    <text x="300" y="394" text-anchor="middle" class="node-type">[Person]</text>
    <text x="300" y="428" text-anchor="middle" class="node-desc">Registra débitos e créditos</text>
    <text x="300" y="454" text-anchor="middle" class="node-desc">e consulta o saldo diário</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="685" y="365" width="330" height="190" rx="18" fill="#3e87d6"/>
    <text x="850" y="424" text-anchor="middle" class="node-title">Cashflow Daily Control</text>
    <text x="850" y="454" text-anchor="middle" class="node-title">Platform</text>
    <text x="850" y="490" text-anchor="middle" class="node-type">[Software System]</text>
    <text x="850" y="524" text-anchor="middle" class="node-desc">Escrita transacional, outbox</text>
    <text x="850" y="550" text-anchor="middle" class="node-desc">evento `entry-created`</text>
    <text x="850" y="576" text-anchor="middle" class="node-desc">e leitura agregada</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1240" y="300" width="280" height="160" rx="18" fill="#9a9a9a"/>
    <text x="1380" y="358" text-anchor="middle" class="node-title-light">Observabilidade</text>
    <text x="1380" y="390" text-anchor="middle" class="node-type-light">[Software System]</text>
    <text x="1380" y="424" text-anchor="middle" class="node-desc-light">Recebe logs, métricas</text>
    <text x="1380" y="450" text-anchor="middle" class="node-desc-light">e alarmes operacionais</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1240" y="520" width="280" height="160" rx="18" fill="#9a9a9a"/>
    <text x="1380" y="578" text-anchor="middle" class="node-title-light">Mensageria</text>
    <text x="1380" y="610" text-anchor="middle" class="node-type-light">[Software System]</text>
    <text x="1380" y="644" text-anchor="middle" class="node-desc-light">Recebe `entry-created`</text>
    <text x="1380" y="670" text-anchor="middle" class="node-desc-light">e desacopla o saldo diário</text>
  </g>

  <g filter="url(#shadow)">
    <circle cx="300" cy="585" r="34" fill="#174a86"/>
    <path d="M260 665c0-27 20-46 40-46s40 19 40 46v10h-80z" fill="#174a86"/>
    <rect x="190" y="665" width="220" height="145" rx="20" fill="#174a86"/>
    <text x="300" y="716" text-anchor="middle" class="node-title">Equipe de Operações</text>
    <text x="300" y="748" text-anchor="middle" class="node-type">[Person]</text>
    <text x="300" y="782" text-anchor="middle" class="node-desc">Monitora a saúde da solução</text>
  </g>

  <path d="M390 385H685" stroke="#7c8798" stroke-width="3" stroke-dasharray="8 8" fill="none" marker-end="url(#arrow)"/>
  <path d="M1015 420H1240" stroke="#7c8798" stroke-width="3" stroke-dasharray="8 8" fill="none" marker-end="url(#arrow)"/>
  <path d="M1015 510C1110 540 1160 560 1240 600" stroke="#7c8798" stroke-width="3" stroke-dasharray="8 8" fill="none" marker-end="url(#arrow)"/>
  <path d="M410 740C520 725 620 650 705 555" stroke="#7c8798" stroke-width="3" stroke-dasharray="8 8" fill="none" marker-end="url(#arrow)"/>
  <path d="M410 770C600 840 1045 840 1315 685" stroke="#7c8798" stroke-width="3" stroke-dasharray="8 8" fill="none" marker-end="url(#arrow)"/>

  <text x="535" y="370" text-anchor="middle" class="edge">Usa via REST API</text>
  <text x="1128" y="405" text-anchor="middle" class="edge">Envia logs e métricas</text>
  <text x="1148" y="548" text-anchor="middle" class="edge">Publica eventos assíncronos</text>
  <text x="560" y="655" text-anchor="middle" class="edge">Monitora backlog e saúde</text>
  <text x="840" y="860" text-anchor="middle" class="edge">Consulta dashboards e alertas</text>

  <g filter="url(#shadow)">
    <rect x="110" y="900" width="1480" height="170" rx="28" fill="#ffffff" stroke="#cbd5e1" stroke-dasharray="4 6"/>
    <text x="145" y="940" class="legend-title">Legenda</text>

    <g transform="translate(170 972)">
      <circle cx="22" cy="10" r="14" fill="#174a86"/>
      <path d="M6 42c0-12 7-20 16-20s16 8 16 20v5H6z" fill="#174a86"/>
      <rect x="0" y="42" width="44" height="44" rx="12" fill="#174a86"/>
      <text x="68" y="30" class="legend-text">Pessoa</text>
      <text x="68" y="52" class="legend-text">Ator humano do domínio</text>
    </g>

    <g transform="translate(520 968)">
      <rect width="120" height="86" rx="14" fill="#3e87d6"/>
      <text x="60" y="36" text-anchor="middle" class="label">Software System</text>
      <text x="60" y="61" text-anchor="middle" class="legend-text" fill="#ffffff">Sistema em escopo</text>
    </g>

    <g transform="translate(760 968)">
      <rect width="120" height="86" rx="14" fill="#9a9a9a"/>
      <text x="60" y="36" text-anchor="middle" class="label">Software System</text>
      <text x="60" y="61" text-anchor="middle" class="legend-text" fill="#ffffff">Sistema externo</text>
    </g>

    <g transform="translate(1000 1008)">
      <path d="M0 0H140" stroke="#7c8798" stroke-width="3" stroke-dasharray="8 8" marker-end="url(#arrow)"/>
      <text x="70" y="-10" text-anchor="middle" class="legend-text">Relação</text>
    </g>
  </g>
</svg>
