<svg xmlns="http://www.w3.org/2000/svg" width="1900" height="1380" viewBox="0 0 1900 1380" role="img" aria-labelledby="title desc">
  <title id="title">C4 - Nível 2: Containers</title>
  <desc id="desc">Diagrama C4 de containers mostrando os principais containers da plataforma e suas relações.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbfdff"/>
      <stop offset="100%" stop-color="#eef3f9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#7c8798"/>
    </marker>
    <style>
      .title { font: 700 34px 'Aptos', 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 18px 'Aptos', 'Segoe UI', Arial, sans-serif; fill: #475569; }
      .boundary-title { font: 700 20px 'Aptos', 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .boundary-sub { font: 400 15px 'Aptos', 'Segoe UI', Arial, sans-serif; fill: #64748b; }
      .node-title { font: 700 22px 'Aptos', 'Segoe UI', Arial, sans-serif; fill: #ffffff; }
      .node-title-light { font: 700 22px 'Aptos', 'Segoe UI', Arial, sans-serif; fill: #ffffff; }
      .node-type { font: 400 15px 'Aptos', 'Segoe UI', Arial, sans-serif; fill: #dbeafe; }
      .node-type-light { font: 400 15px 'Aptos', 'Segoe UI', Arial, sans-serif; fill: #eef2f7; }
      .node-text { font: 400 15px 'Aptos', 'Segoe UI', Arial, sans-serif; fill: #eff6ff; }
      .node-text-light { font: 400 15px 'Aptos', 'Segoe UI', Arial, sans-serif; fill: #f8fafc; }
      .edge { font: 600 14px 'Aptos', 'Segoe UI', Arial, sans-serif; fill: #5b6678; }
      .legend-title { font: 700 18px 'Aptos', 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .legend-text { font: 400 14px 'Aptos', 'Segoe UI', Arial, sans-serif; fill: #475569; }
      .tiny { font: 700 12px 'Aptos', 'Segoe UI', Arial, sans-serif; fill: #ffffff; }
      .tiny-dark { font: 700 12px 'Aptos', 'Segoe UI', Arial, sans-serif; fill: #334155; }
    </style>
  </defs>

  <rect width="1900" height="1380" fill="url(#bg)"/>
  <text x="950" y="88" text-anchor="middle" class="title">C4 - Nível 2: Containers</text>
  <text x="950" y="124" text-anchor="middle" class="subtitle">Principais containers da plataforma, tecnologias adotadas e relações entre escrita, mensageria e leitura agregada</text>

  <g filter="url(#shadow)">
    <circle cx="210" cy="215" r="34" fill="#174a86"/>
    <path d="M170 295c0-27 20-46 40-46s40 19 40 46v10h-80z" fill="#174a86"/>
    <rect x="120" y="295" width="180" height="148" rx="20" fill="#174a86"/>
    <text x="210" y="347" text-anchor="middle" class="node-title">Comerciante</text>
    <text x="210" y="378" text-anchor="middle" class="node-type">[Person]</text>
    <text x="210" y="412" text-anchor="middle" class="node-text">Cria lançamentos e</text>
    <text x="210" y="438" text-anchor="middle" class="node-text">consulta saldo diário</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="380" y="250" width="1140" height="770" rx="26" fill="#ffffff" stroke="#0f172a" stroke-width="1.5"/>
    <text x="410" y="288" class="boundary-title">Cashflow Daily Control Platform</text>
    <text x="410" y="314" class="boundary-sub">[Software System] Bounded contexts `Ledger` e `Daily Balance`</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="470" y="395" width="285" height="210" rx="18" fill="#3e87d6"/>
    <text x="612" y="452" text-anchor="middle" class="node-title">Ledger Service</text>
    <text x="612" y="482" text-anchor="middle" class="node-type">[Container: TypeScript, NestJS]</text>
    <text x="612" y="518" text-anchor="middle" class="node-text">Recebe `POST /entries`</text>
    <text x="612" y="544" text-anchor="middle" class="node-text">valida idempotência</text>
    <text x="612" y="570" text-anchor="middle" class="node-text">grava lançamentos e outbox</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="825" y="395" width="255" height="210" rx="18" fill="#3e87d6"/>
    <text x="952" y="452" text-anchor="middle" class="node-title">Outbox Publisher</text>
    <text x="952" y="482" text-anchor="middle" class="node-type">[Container: Worker]</text>
    <text x="952" y="520" text-anchor="middle" class="node-text">Lê eventos pendentes</text>
    <text x="952" y="546" text-anchor="middle" class="node-text">e publica na fila</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1145" y="395" width="255" height="210" rx="18" fill="#9a9a9a"/>
    <text x="1272" y="452" text-anchor="middle" class="node-title-light">Event Queue</text>
    <text x="1272" y="482" text-anchor="middle" class="node-type-light">[Container: SQS / ElasticMQ]</text>
    <text x="1272" y="520" text-anchor="middle" class="node-text-light">Canal assíncrono</text>
    <text x="1272" y="546" text-anchor="middle" class="node-text-light">para `entry-created`</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="880" y="700" width="330" height="220" rx="18" fill="#3e87d6"/>
    <text x="1045" y="760" text-anchor="middle" class="node-title">Daily Balance Service</text>
    <text x="1045" y="790" text-anchor="middle" class="node-type">[Container: TypeScript, NestJS]</text>
    <text x="1045" y="826" text-anchor="middle" class="node-text">Consome eventos</text>
    <text x="1045" y="852" text-anchor="middle" class="node-text">consolida o saldo diário</text>
    <text x="1045" y="878" text-anchor="middle" class="node-text">e expõe `GET /daily-balance`</text>
  </g>

  <g filter="url(#shadow)">
    <ellipse cx="690" cy="810" rx="130" ry="34" fill="#3e87d6"/>
    <path d="M560 810V915c0 18 58 34 130 34s130-16 130-34V810" fill="#3e87d6"/>
    <ellipse cx="690" cy="915" rx="130" ry="34" fill="#3e87d6"/>
    <text x="690" y="820" text-anchor="middle" class="node-title">PostgreSQL</text>
    <text x="690" y="850" text-anchor="middle" class="node-type">[Container DB: PostgreSQL]</text>
    <text x="690" y="884" text-anchor="middle" class="node-text">Schemas `ledger` e `balance`</text>
    <text x="690" y="910" text-anchor="middle" class="node-text">idempotência e outbox</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1360" y="710" width="270" height="180" rx="18" fill="#9a9a9a"/>
    <text x="1495" y="766" text-anchor="middle" class="node-title-light">Observabilidade</text>
    <text x="1495" y="798" text-anchor="middle" class="node-type-light">[Container: Logs / Métricas]</text>
    <text x="1495" y="834" text-anchor="middle" class="node-text-light">Recebe logs, métricas</text>
    <text x="1495" y="860" text-anchor="middle" class="node-text-light">e alarmes</text>
  </g>

  <path d="M300 370C380 390 430 430 470 485" stroke="#7c8798" stroke-width="3" stroke-dasharray="8 8" fill="none" marker-end="url(#arrow)"/>
  <path d="M755 500H825" stroke="#7c8798" stroke-width="3" stroke-dasharray="8 8" fill="none" marker-end="url(#arrow)"/>
  <path d="M1080 500H1145" stroke="#7c8798" stroke-width="3" stroke-dasharray="8 8" fill="none" marker-end="url(#arrow)"/>
  <path d="M1272 605C1272 650 1180 690 1120 720" stroke="#7c8798" stroke-width="3" stroke-dasharray="8 8" fill="none" marker-end="url(#arrow)"/>
  <path d="M612 605C612 670 640 725 660 776" stroke="#7c8798" stroke-width="3" stroke-dasharray="8 8" fill="none" marker-end="url(#arrow)"/>
  <path d="M780 915C860 955 960 952 1025 920" stroke="#7c8798" stroke-width="3" stroke-dasharray="8 8" fill="none" marker-end="url(#arrow)"/>
  <path d="M1210 808H1360" stroke="#7c8798" stroke-width="3" stroke-dasharray="8 8" fill="none" marker-end="url(#arrow)"/>

  <text x="396" y="402" text-anchor="middle" class="edge">Usa REST API</text>
  <text x="790" y="484" text-anchor="middle" class="edge">Persiste eventos pendentes</text>
  <text x="1112" y="484" text-anchor="middle" class="edge">Publica `entry-created`</text>
  <text x="1210" y="678" text-anchor="middle" class="edge">Consome com idempotência</text>
  <text x="590" y="700" text-anchor="middle" class="edge">Usa SQL transacional</text>
  <text x="900" y="988" text-anchor="middle" class="edge">Consulta via HTTP</text>
  <text x="1285" y="790" text-anchor="middle" class="edge">Envia logs e métricas</text>

  <g filter="url(#shadow)">
    <rect x="170" y="1120" width="1560" height="200" rx="28" fill="#ffffff" stroke="#cbd5e1" stroke-dasharray="4 6"/>
    <text x="210" y="1160" class="legend-title">Legenda</text>

    <g transform="translate(250 1190)">
      <circle cx="20" cy="12" r="12" fill="#174a86"/>
      <path d="M6 38c0-10 6-18 14-18s14 8 14 18v4H6z" fill="#174a86"/>
      <rect x="0" y="38" width="40" height="38" rx="10" fill="#174a86"/>
      <text x="62" y="32" class="legend-text">Person</text>
      <text x="62" y="54" class="legend-text">Ator humano</text>
    </g>

    <g transform="translate(520 1180)">
      <rect width="125" height="80" rx="14" fill="#3e87d6"/>
      <text x="62.5" y="33" text-anchor="middle" class="tiny">Container</text>
      <text x="62.5" y="56" text-anchor="middle" class="legend-text" fill="#ffffff">Interno</text>
    </g>

    <g transform="translate(760 1180)">
      <rect width="125" height="80" rx="14" fill="#9a9a9a"/>
      <text x="62.5" y="33" text-anchor="middle" class="tiny">Container</text>
      <text x="62.5" y="56" text-anchor="middle" class="legend-text" fill="#ffffff">Externo</text>
    </g>

    <g transform="translate(1000 1178)">
      <ellipse cx="62" cy="18" rx="48" ry="14" fill="#3e87d6"/>
      <path d="M14 18V58c0 9 21 16 48 16s48-7 48-16V18" fill="#3e87d6"/>
      <ellipse cx="62" cy="58" rx="48" ry="14" fill="#3e87d6"/>
      <text x="62" y="36" text-anchor="middle" class="tiny">Container DB</text>
      <text x="62" y="90" text-anchor="middle" class="legend-text">Banco de dados</text>
    </g>

    <g transform="translate(1280 1220)">
      <path d="M0 0H140" stroke="#7c8798" stroke-width="3" stroke-dasharray="8 8" marker-end="url(#arrow)"/>
      <text x="70" y="-10" text-anchor="middle" class="legend-text">Relação</text>
    </g>
  </g>
</svg>
