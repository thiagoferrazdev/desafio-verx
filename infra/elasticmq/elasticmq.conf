include classpath("application.conf")

node-address {
  protocol = http
  host = "0.0.0.0"
  port = 9324
  context-path = ""
}

rest-sqs {
  enabled = true
  bind-port = 9324
  bind-hostname = "0.0.0.0"
  sqs-limits = strict
}

queues {
  entry-created {
    defaultVisibilityTimeout = 10 seconds
    delay = 0 seconds
    receiveMessageWait = 2 seconds
    fifo = false
    contentBasedDeduplication = false
  }
}
